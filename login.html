<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Panel de Administración</title>

    <script src="assets/js/credenciales-locales.js"></script>

    <link rel="stylesheet" href="assets/css/styles.css">
</head>
<body>
    <div class="auth-card">
        <h2>Ingresar al Panel</h2>
        <form id="login-form">
            <div class="form-group">
                <label for="email">Correo Electrónico</label>
                <input type="email" id="email" required placeholder="tu@email.com">
            </div>
            <div class="form-group">
                <label for="password">Contraseña</label>
                <input type="password" id="password" required placeholder="******">
            </div>
            <button type="submit" class="btn btn-primary btn-block">Entrar</button>
            <p id="error-msg" class="error-text" style="display: none;"></p>
        </form>
    </div>

    <script type="module">
        import { loginUser, checkAuth } from './assets/js/auth.js';
        
        // Si ya está logueado, lo mandamos al admin directamente
        checkAuth(false);

        document.getElementById('login-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const errorMsg = document.getElementById('error-msg');

            try {
                await loginUser(email, password);
                window.location.href = 'admin.html';
            } catch (error) {
                errorMsg.innerText = "Error: Credenciales inválidas";
                errorMsg.style.display = 'block';
            }
        });
    </script>
</body>
</html>
